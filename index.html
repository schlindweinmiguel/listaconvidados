<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Lista de Convidados</h1>
            <p>Escolha os filtros para exibir os convidados de acordo com suas preferências.</p>
        </header>

        <div class="filters">
            <button onclick="filtrarComA()">Nomes que começam com 'A'</button>
            <button onclick="filtrarMaisDeCinco()">Nomes com mais de 5 letras</button>
            <button onclick="mostrarTodos()">Mostrar Todos</button>
        </div>

        <div class="name-list">
            <h2>Convidados:</h2>
            <ul id="guestList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
